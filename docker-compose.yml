version: "3.9"

services:
  backend:
    build: .

    container_name: healthcare_backend

    ports:
      - "5000:5000"

    env_file:
      - .env

    volumes:
      - .:/app
      - /app/node_modules

    depends_on:
      - redis

    restart: always

  redis:
    image: redis:7-alpine

    container_name: healthcare_redis

    ports:
      - "6379:6379"

    restart: always